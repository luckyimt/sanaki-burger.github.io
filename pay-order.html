  <style>
    * {

    html,body {

background-image: url("tiger.jpg");
      font-family: 'Outfit', sans-serif;

  background-attachment: fixed; 
      display: flex;
      align-items: center;
       overflow: hidden;
      justify-content: center;

      box-sizing: border-box;

    }

    .ticket-container {
background-image: url("burger.jpg");

  background-size: cover;          /* Keeps aspect ratio */
  background-position: center;     /* Centers image */
  background-repeat: no-repeat;
  background-attachment: fixed;

    .ticket-title {
      text-align: center;
      font-size: 1.5rem;
      color: #000000;

    }

    .ticket-info {
      color: #000000;
      text-shadow: 0 0 10px #00000000;

      color: #000000;

    .qr-code {
      text-align: center;

    }

    .qr-code img {
      width: 150px;
      height: 150px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,255,150,0.4);
    }

    .status {
      margin-top: 20px;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      background: #003322;
      color: #00ffcc;
      font-weight: bold;
    }

    @media (max-width: 500px) {
      .ticket-container {

</head>
<body>

  <div class="ticket-container">
    <div class="ticket-title">order details</div>

<div class="ticket-info">
<div class="info-item">
<div class="label">sanaki-burger</div>

<div class="info-item">
<div class="label">date of order</div>
<div id = "date" class="value">'${date}'</div>
</div>

<div class="info-item"> 
<div class="label">total</div>
<div id="total">'${total}'</div></div>

<div class="info-item"> 
<div class="label">order number</div>
<div id="ticket-id">'${orderId}'</div></div>

<div class="qr-code">
<img src="https://api.qrserver.com/v1/create-qr-code/?data=TK-982541&size=150x150" alt="QR Code">
</div>

<div id="paypal-button-container"></div>
</div>


<script>
function getQueryParam(name) {
const urlParams = new URLSearchParams(window.location.search);
return urlParams.get(name);
}
</script>

<script>
const now = new Date().toISOString().split('T')[0];

const ticketId = getQueryParam('orderId');
const name = getQueryParam('email');
const total = getQueryParam('total');
const item = getQueryParam('items');

document.getElementById('ticket-id').textContent = ticketId + " : " + name;
document.getElementById('total').textContent = total;
document.getElementById('date').textContent = now;
</script>


<script>
const express = require('express');
const app = express();
const port = 3000;

app.use(express.json());

app.post("/webhook/paypal", async (req, res) => {
    const body = req.body;

    if (body.event_type === "PAYMENT.SALE.COMPLETED") {
        const orderId = body.resource.parent_payment;
        const payerEmail = body.resource.payer.payer_info.email;
        const amount = body.resource.amount.total;

        // Save to database
        await saveOrderToDatabase(orderId, payerEmail, amount);

        res.sendStatus(200);
    } else {
        res.sendStatus(400);
    }
}
);
</script>

<script>

let currentTotal = total;

</script>

<script>
paypal.Buttons({
 style: {
        layout: 'vertical',
        color:  'blue',
        shape:  'rect',
        label:  'pay'
      },
  createOrder: function(data, actions) {
    return actions.order.create({
      purchase_units: [{
        amount: {
          value: currentTotal
        }
      }]
    });
  },
     onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
            // ✅ Notify store owner here (via your backend)
            fetch('/notify-store-owner', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    payerName: details.payer.name.given_name,
                    payerEmail: details.payer.email_address,
                    amount: details.purchase_units[0].amount.value
                })
            });
            alert('Transaction completed by ' + details.payer.name.given_name);
        });
    }
}).render('#paypal-button-container');

</script>


</body>
</html>
